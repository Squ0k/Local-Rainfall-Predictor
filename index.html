<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Local Rainfall Predictor</title>

<!-- ONNX runtime -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

<!-- Service worker registration -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'));
}
</script>

<!-- Styles -->
<style>
body { font-family: Arial; text-align:center; }
#drop { border:2px dashed gray; padding:30px; margin:20px; }
video, canvas, img { max-width:300px; margin:10px; }
button { padding:10px; margin:5px; }
</style>

</head>

<body>

<h2>Local Rainfall Predictor</h2>

<div id="drop">Drag & Drop Image Here</div>

<input type="file" id="upload" accept="image/*"><br>

<button onclick="startCamera()">Start Camera</button> <button onclick="capture()">Capture</button><br>

<video id="video" autoplay playsinline></video> <canvas id="canvas" width="128" height="128" style="display:none;"></canvas>

<img id="preview"><br>

<button onclick="runModel()">Run Model</button>

<div id="result"></div>

<script>

let session;
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const drop = document.getElementById("drop");

// Load model
async function init(){
    session = await ort.InferenceSession.create("model.onnx");
    console.log("Model loaded");
}
init();

// Upload file
document.getElementById("upload").onchange = e => {
    preview.src = URL.createObjectURL(e.target.files[0]);
};

// Drag & drop
drop.ondragover = e => {
    e.preventDefault();
};
drop.ondrop = e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    preview.src = URL.createObjectURL(file);
};

// Camera
async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;
}

// Capture
function capture(){
    ctx.drawImage(video, 0, 0, 128, 128);
    preview.src = canvas.toDataURL();
}

// Convert image → tensor
function imageToTensor(){

    ctx.drawImage(preview, 0, 0, 128, 128);
    const imgData = ctx.getImageData(0,0,128,128);

    const data = new Float32Array(1*3*128*128);

    for(let i=0;i<128*128;i++){
        let r = imgData.data[i*4] / 255.0;
        let g = imgData.data[i*4+1] / 255.0;
        let b = imgData.data[i*4+2] / 255.0;

        // Normalization mean = 0.5 std = 0.5
        r = (r - 0.5)/0.5;
        g = (g - 0.5)/0.5;
        b = (b - 0.5)/0.5;

        data[i] = r;
        data[i + 128*128] = g;
        data[i + 2*128*128] = b;
    }

    return new ort.Tensor("float32", data, [1,3,128,128]);
}

// Run model
async function runModel(){

    if(!preview.src){
        alert("Upload or capture image first");
        return;
    }

    document.getElementById("result").innerText = "Running...";

    const tensor = imageToTensor();

    const feeds = {};
    feeds[session.inputNames[0]] = tensor;

    const results = await session.run(feeds);

    const output = results[session.outputNames[0]].data;

    let max = -Infinity;
    let idx = -1;

    for(let i=0;i<output.length;i++){
        if(output[i] > max){
            max = output[i];
            idx = i;
        }
    }

    if(idx == 0){
	document.getElementById("result").innerText = "Prediction: no rain in the area within the next 2 hours"
    } else {
	document.getElementById("result").innerText = "Prediction: will rain in the area within the next 2 hours"
    }
}

</script>

</body>
</html>
